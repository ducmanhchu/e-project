<div
	style="
		font-family:
			-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;
		max-width: 480px;
		margin: 0 auto;
		padding: 20px;
		color: #333;
	"
>
	<h2 style="color: #333; margin-top: 0">Xác thực tài khoản</h2>
	<p>Chào <strong>{{fullName}}</strong>,</p>
	<p>
		Cảm ơn bạn đã đăng ký tài khoản với hệ thống học tiếng Anh Wordwise. Chọn
		nút bên dưới để xác thực tài khoản:
	</p>
	<p style="text-align: center; margin: 24px 0">
		<a
			href="{{link}}"
			style="
				display: inline-block;
				padding: 12px 24px;
				background: #0066ff;
				color: white;
				text-decoration: none;
				border-radius: 6px;
				font-weight: 500;
			"
			>XÁC THỰC</a
		>
	</p>
	<p style="color: #666; font-size: 13px">
		Đường dẫn có hiệu lực trong 24 giờ.
	</p>
	<p
		style="
			color: #999;
			font-size: 12px;
			margin-top: 32px;
			border-top: 1px solid #eee;
			padding-top: 16px;
		"
	>
		Nếu bạn không tạo tài khoản, vui lòng bỏ qua tin nhắn này.
	</p>
</div>

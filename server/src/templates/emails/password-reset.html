<div
	style="
		font-family:
			-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;
		max-width: 480px;
		margin: 0 auto;
		padding: 20px;
		color: #333;
	"
>
	<h2 style="color: #333; margin-top: 0">Đặt lại mật khẩu</h2>
	<p>Chào <strong>{{fullName}}</strong>,</p>
	<p>
		Chúng tôi nhận được yêu cầu đặt lại mật khẩu cho tài khoản trên hệ thống học
		tiếng Anh Wordwise của bạn. Chọn nút bên dưới để tiếp tục:
	</p>
	<p style="text-align: center; margin: 24px 0">
		<a
			href="{{link}}"
			style="
				display: inline-block;
				padding: 12px 24px;
				background: #dc2626;
				color: white;
				text-decoration: none;
				border-radius: 6px;
				font-weight: 500;
			"
			>ĐẶT LẠI MẬT KHẨU</a
		>
	</p>
	<p style="color: #666; font-size: 13px">Đường dẫn có hiệu lực trong 1 giờ.</p>
	<p
		style="
			color: #c00;
			font-size: 12px;
			margin-top: 32px;
			border-top: 1px solid #eee;
			padding-top: 16px;
		"
	>
		<strong
			>Nếu bạn không yêu cầu đặt lại mật khẩu, vui lòng bỏ qua tin nhắn
			này</strong
		>
	</p>
</div>

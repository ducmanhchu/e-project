name: Sync dev from main

# Sau squash merge dev → main, main có 1 commit mới gom toàn bộ thay đổi.
# Merge main vào dev (không reset/force-push) để giữ nguyên lịch sử commit trên dev và đồng bộ code từ main qua merge commit.
on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write

jobs:
  sync-dev:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Merge main into dev
        run: |
          git fetch origin main
          git merge origin/main --no-edit
          git push origin dev
